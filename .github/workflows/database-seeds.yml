name: Seeds CI/CD

on:
  push:
    branches:
      - "main"
    paths:
      - "db/seeds/**"
      - "typescript/seeds-scripts/**"
      - "typescript/common/**"
      - ".github/workflows/database-seeds.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "db/seeds/**"
      - "typescript/seeds-scripts/**"
      - "typescript/common/**"
      - ".github/workflows/database-seeds.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Tests
        run: bun run --filter tachi-seeds-scripts test
        env:
          NODE_ENV: "test"

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    concurrency:
      group: "seeds-lock-${{ github.sha }}"
      cancel-in-progress: false
    steps:
      - name: Enable SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy updates
        env:
          TACHI_HOST: ${{ secrets.TACHI_HOST }}
        run: ssh ci@"$TACHI_HOST" /home/ci/tachi-devops/scripts/deploy_seeds.sh
