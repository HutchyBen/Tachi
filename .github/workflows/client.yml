name: Client CI/CD

on:
  push:
    branches:
      - "main"
    paths:
      - "typescript/client/**"
      - "typescript/common/**"
      - ".github/workflows/client.yml"

  pull_request:
    branches:
      - "main"
    paths:
      - "typescript/client/**"
      - "typescript/common/**"
      - ".github/workflows/client.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zkldi/tachi-dev:main
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run --filter tachi-client lint

      - name: Typecheck
        run: bun run --filter tachi-client typecheck

  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zkldi/tachi-dev:main
      options: --user root
    needs: test
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: rm .env
        run: rm typescript/client/.env

      - name: Build Bokutachi
        run: bun run --filter tachi-client build
        env:
          VITE_GIT_REPO: "GitHub:zkldi/Tachi"
          VITE_TCHIC_MODE: "boku"
          VITE_RECAPTCHA_KEY: "6LcsYbIpAAAAAEJffjIXmbQcxj_SBZG7BnSPjF4L"
          VITE_SERVER_URL: "https://v3-boku.tachi.ac"
          VITE_DISCORD: "https://discord.gg/E4n8ZZF5ES"
          VITE_CDN_URL: "https://cdn-v3-boku.tachi.ac"
          TACHI_NAME: "Bokutachi"
          BUILD_OUT_DIR: /tmp/boku

      - name: Build Kamaitachi (v3)
        run: bun run --filter tachi-client build
        env:
          VITE_MANDATE_LOGIN: true
          VITE_SERVER_URL: "https://v3-kamai.tachi.ac"
          VITE_EAG_CLIENT_ID: "332B9789DEA10B94DB0E345A6F8ECF54BB86E6DD"
          VITE_FLO_CLIENT_ID: "98B965554FB2341D969667F3D04CFC28F8C080ED"
          VITE_MIN_CLIENT_ID: "A0DBDBB063CD800530EF01C6488B282137E0191E"
          VITE_DISCORD: "https://discord.gg/NNgGJbpQUj"
          VITE_TCHIC_MODE: "kamai"
          VITE_CDN_URL: "https://cdn-v3-kamai.tachi.ac"
          VITE_GIT_REPO: "GitHub:zkldi/Tachi"
          VITE_RECAPTCHA_KEY: "6LcsYbIpAAAAAEJffjIXmbQcxj_SBZG7BnSPjF4L"
          TACHI_NAME: "Kamaitachi"
          BUILD_OUT_DIR: /tmp/kamai

      - name: Build Dev
        run: bun run --filter tachi-client build
        env:
          VITE_MANDATE_LOGIN: true
          VITE_SERVER_URL: "https://dev.tachi.ac"
          VITE_TCHIC_MODE: "omni"
          VITE_CDN_URL: "https://cdn-dev.tachi.ac"
          VITE_EAG_CLIENT_ID: "A52JhudyAPK1KdBS3NrUhNsn"
          VITE_FLO_CLIENT_ID: "9krYLjq1rz9icCefO6OWxoMk"
          VITE_MIN_CLIENT_ID: "A0DBDBB063CD800530EF01C6488B282137E0191E"
          VITE_GIT_REPO: "GitHub:zkldi/Tachi3"
          VITE_RECAPTCHA_KEY: "6LcsYbIpAAAAAEJffjIXmbQcxj_SBZG7BnSPjF4L"
          TACHI_NAME: "Tachi Dev"
          BUILD_OUT_DIR: /tmp/dev

      - name: Bundle build outputs
        run: tar -C /tmp -czf client-builds.tgz boku kamai dev

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: client-builds
          path: client-builds.tgz
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: client-builds

      - name: Unpack build outputs
        run: |
          mkdir -p /tmp/boku /tmp/kamai /tmp/dev
          tar -C /tmp -xzf client-builds.tgz

      - name: Enable SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy static to VPS (Caddy roots)
        env:
          TACHI_HOST: ${{ secrets.TACHI_HOST }}
        run: |
          rsync --recursive --compress --delete --progress /tmp/kamai/. "ci@${TACHI_HOST}:/srv/tachi-static/kamai/"
          rsync --recursive --compress --delete --progress /tmp/boku/. "ci@${TACHI_HOST}:/srv/tachi-static/boku/"
          rsync --recursive --compress --delete --progress /tmp/dev/. "ci@${TACHI_HOST}:/srv/tachi-static/dev/"
