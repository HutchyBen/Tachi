name: Common CI/CD

on:
  push:
    branches:
      - "main"
    paths:
      - "common/**"
  pull_request:
    branches:
      - "main"
    paths:
      - "common/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Linter
        run: bun run --filter tachi-common lint
        env:
          NODE_ENV: "test"

      - name: Run Tests
        run: bun run --filter tachi-common test
        env:
          NODE_ENV: "test"
