name: Common CI/CD

on:
  push:
    branches:
      - "main"
    paths:
      - "typescript/common/**"
      - ".github/workflows/common.yml"
  pull_request:
    branches:
      - "main"
    paths:
      - "typescript/common/**"
      - ".github/workflows/common.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: "ghcr.io/${{ github.repository }}-dev:main"
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Linter
        run: bun run --filter tachi-common lint
        env:
          NODE_ENV: "test"

      - name: Run Tests
        run: bun run --filter tachi-common test
        env:
          NODE_ENV: "test"
