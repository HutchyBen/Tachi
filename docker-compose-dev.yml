services:
  mongo:
    container_name: mongo
    command: "--config /etc/mongod.conf"
    image: mongo:5
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - tachi-volume:/data/db
      - "./dev/mongod.conf:/etc/mongod.conf"

  redis:
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning
    image: redis:6
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tachi-redis:/data
  postgres:
    container_name: postgres
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tachi
      POSTGRES_PASSWORD: tachi
      POSTGRES_DB: tachi
    volumes:
      - tachi-postgres:/var/lib/postgresql
      - "./dev/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql"

  tachi-dev:
    user: "1000:1000"
    tty: true
    container_name: tachi-dev
    build:
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080" # server
      - "3000:3000" # client
      - "3001:3001" # docs
    volumes:
      - ./:/tachi
      # Mount your home files under your-pc, so you can easily access them
      - ~:/host-pc
      # keep node_modules inside the container, not on the host mount
      - /tachi/node_modules/
      - /tachi/.bun

volumes:
  tachi-volume:
  tachi-redis:
  tachi-logs:
  tachi-postgres:
